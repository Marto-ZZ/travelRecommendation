<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TravelBloom</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para el formulario */
        .contact-section { padding: 8rem 5% 4rem; max-width: 600px; margin: 0 auto; }
        .contact-section h1 { color: var(--primary-color); text-align: center; margin-bottom: 2rem; }
        .contact-form { background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-weight: bold; color: #333; }
        .form-group input, .form-group textarea { padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .submit-btn { background-color: var(--primary-color); color: white; border: none; padding: 1rem; border-radius: 4px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background-color: var(--primary-hover); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <h2>TravelBloom</h2>
        </div>
        <ul class="nav-links">
            <li><a href="travel_recommendation.html">Home</a></li>
            <li><a href="about_us.html">About Us</a></li>
            <li><a href="contact_us.html">Contact Us</a></li>
        </ul>
    </nav>

    <section class="contact-section">
        <h1>Contact Us</h1>
        
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </section>

</body>
</html>
